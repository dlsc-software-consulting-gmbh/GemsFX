# Builds the project and publishes native installers to GitHub Releases via jDeploy.
# On push to master: publishes to a rolling "master" release (snapshot).
# On tag push: adds installers as artifacts to the tagged release.
# See https://www.jdeploy.com for more information.

name: jDeploy

on:
  push:
    branches:
      - master
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 24 with JavaFX
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'zulu'
          cache: maven

      - name: Build with Maven
        run: ./mvnw -B package -pl gemsfx-demo -am -DskipTests

      - name: Build and publish installers with jDeploy
        uses: shannah/jdeploy@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
