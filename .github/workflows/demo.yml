# Builds the project and publishes native installers to GitHub Releases via jDeploy.
# See https://www.jdeploy.com for more information.

name: "Demo-Launcher"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: demo-launcher

      - name: Set up Java 24 with JavaFX
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'zulu'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-npm

      - name: Read project version from pom.xml
        id: project_version
        run: echo "version=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Determine release version with build number
        id: release_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LIB_VERSION="${{ steps.project_version.outputs.version }}"
          EXISTING=$(gh release list --repo ${{ github.repository }} --limit 100 --json tagName \
            --jq ".[].tagName" \
            | grep -cE "^${LIB_VERSION}(b[0-9]+)?$" || true)
          BUILD_NUM=$((EXISTING + 1))
          if [ "$BUILD_NUM" -eq 1 ]; then
            RELEASE_VERSION="${LIB_VERSION}"
          else
            RELEASE_VERSION="${LIB_VERSION}b${BUILD_NUM}"
          fi
          echo "release_version=${RELEASE_VERSION}" >> $GITHUB_OUTPUT

      - name: Update version in package.json
        run: npm version ${{ steps.release_version.outputs.release_version }} --no-git-tag-version

      - name: Build with Maven
        run: ./mvnw -B package -pl gemsfx-demo -am -DskipTests

      - name: Build and publish installers with jDeploy
        uses: shannah/jdeploy@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
